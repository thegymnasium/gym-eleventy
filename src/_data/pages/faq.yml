header:
  heading: FAQ
what-happened-to-gym:
  heading: What Happened to Gymnasium?
  description: |
    For over 11 years, Gymnasium has been incredibly proud to offer free, high-quality training, helping over 160,000 people worldwide upskill into new careers and truly change lives. We've loved being a part of your learning journey and are immensely grateful for your support and enthusiasm.<br>
    As of June 1, 2025, the course videos are available here and on YouTube. We will no longer be updating courses on our website or providing new certifications.
certificates:
  heading: What Happened to My Certificates and Badges?
  description: |
    You certificates will always be available through <a href="https://accredible.com">Accredible</a>. Please login to your <a href="https://v2.accounts.accredible.com/login">Accredible Dashboard</a> to view or make any changes to your certificates or badges.

