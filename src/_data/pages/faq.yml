header:
  heading: FAQ
what-happened-to-gym:
  heading: What Happened to Gymnasium?
  description: |
    <p><strong>Thank You to Our Learners:</strong> For over 11 years, Gymnasium has been incredibly proud to offer free, high-quality training, helping over 160,000 people worldwide upskill into new careers and truly change lives. We’ve loved being a part of your learning journey and are immensely grateful for your support and enthusiasm.</p>
    <p><strong>Changes to Our Courses:</strong> As of June 1, 2025, all course videos are available in our <a href="/courses/">course catalog</a> and on our <a href="https://www.youtube.com/@AquentGymnasium">YouTube channel</a>. We are no longer updating courses on our website or providing new certifications.</p>
    <p><em>Thank you to everyone.</em> <span aria-label="Heart Hands emoji" role="img">🫶</span> The Gymnasium Team</p>
certificates:
  heading: What Happened to My Certificates and Badges?
  description: |
    You certificates will always be available through <a href="https://accredible.com">Accredible</a>. Please login to your <a href="https://v2.accounts.accredible.com/login">Accredible Dashboard</a> to view or make any changes to your certificates or badges.
